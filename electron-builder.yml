appId: dev.ah2k.echolect
productName: Echolect
directories:
  output: release
files:
  - dist/**/*
  - package.json
  # Bundled into the app so the runtime BrowserWindow icon resolves (see src/main/index.ts).
  - logo.png
  - logo-mark.png
# Publish to GitHub Releases (used by the release workflow with --publish).
publish:
  provider: github

linux:
  icon: build/icon.png
  category: Office
  maintainer: ah2k <https://ah2k.dev>
  target:
    - AppImage
    - deb

win:
  icon: build/icon.png
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
